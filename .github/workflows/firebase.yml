name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install function dependencies
        run: npm ci --prefix functions

      - name: Check JavaScript syntax
        run: npm run check

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STARSMAID }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy hosting, functions, and rules
        run: firebase deploy --only hosting,functions,firestore:rules --project starsmaid --non-interactive
